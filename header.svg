<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap');

      .bg { fill: #0d1117; }

      /* Title typewriter */
      .title {
        font-family: 'Inter', ui-monospace, monospace;
        font-size: 64px;
        font-weight: 900;
        fill: #ffffff;
        letter-spacing: -2px;
      }

      /* Cursor blink */
      .cursor {
        fill: #2563EB;
        animation: blink 1s step-end infinite;
        animation-delay: 2.2s;
        opacity: 0;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Tagline fade in */
      .tagline {
        font-family: 'Inter', ui-monospace, monospace;
        font-size: 20px;
        font-weight: 400;
        fill: #8b949e;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards;
        animation-delay: 2.6s;
      }

      /* Sub-tagline */
      .sub {
        font-family: 'Inter', ui-monospace, monospace;
        font-size: 15px;
        font-weight: 400;
        fill: #2563EB;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards;
        animation-delay: 3.2s;
      }

      /* Accent line */
      .accent-line {
        stroke: #2563EB;
        stroke-width: 3;
        stroke-dasharray: 340;
        stroke-dashoffset: 340;
        animation: drawLine 0.6s ease forwards;
        animation-delay: 2.4s;
      }

      /* Dot accent */
      .dot {
        fill: #2563EB;
        opacity: 0;
        animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
        animation-delay: 2.0s;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }
      @keyframes popIn {
        from { opacity: 0; transform: scale(0); }
        to   { opacity: 1; transform: scale(1); }
      }

      /* Title reveal animation via clip */
      .title-clip {
        animation: revealTitle 0s steps(1) forwards;
      }

      /* Individual letter fade-in stagger */
      .t1  { animation: fadeIn 0.01s forwards; animation-delay: 0.1s;  opacity: 0; }
      .t2  { animation: fadeIn 0.01s forwards; animation-delay: 0.22s; opacity: 0; }
      .t3  { animation: fadeIn 0.01s forwards; animation-delay: 0.34s; opacity: 0; }
      .t4  { animation: fadeIn 0.01s forwards; animation-delay: 0.46s; opacity: 0; }
      .t5  { animation: fadeIn 0.01s forwards; animation-delay: 0.58s; opacity: 0; }
      .t6  { animation: fadeIn 0.01s forwards; animation-delay: 0.70s; opacity: 0; }
      .t7  { animation: fadeIn 0.01s forwards; animation-delay: 0.82s; opacity: 0; }
      .t8  { animation: fadeIn 0.01s forwards; animation-delay: 0.94s; opacity: 0; }
      .t9  { animation: fadeIn 0.01s forwards; animation-delay: 1.06s; opacity: 0; }
      .t10 { animation: fadeIn 0.01s forwards; animation-delay: 1.18s; opacity: 0; }
      .t11 { animation: fadeIn 0.01s forwards; animation-delay: 1.30s; opacity: 0; }

      @keyframes fadeIn {
        to { opacity: 1; }
      }
    </style>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" class="bg" rx="12"/>
  <rect width="900" height="280" fill="url(#grid)" rx="12" opacity="0.6"/>

  <!-- Blue accent dot -->
  <circle class="dot" cx="72" cy="108" r="6" transform-origin="72 108"/>

  <!-- Title - ds-manifest, letter by letter -->
  <text class="title" x="88" y="130">
    <tspan class="t1">d</tspan><tspan class="t2">s</tspan><tspan class="t3">-</tspan><tspan class="t4">m</tspan><tspan class="t5">a</tspan><tspan class="t6">n</tspan><tspan class="t7">i</tspan><tspan class="t8">f</tspan><tspan class="t9">e</tspan><tspan class="t10">s</tspan><tspan class="t11">t</tspan>
  </text>

  <!-- Blinking cursor after last letter -->
  <rect class="cursor" x="636" y="80" width="4" height="58" rx="2"/>

  <!-- Blue underline -->
  <line class="accent-line" x1="88" y1="148" x2="428" y2="148"/>

  <!-- Tagline -->
  <text class="tagline" x="88" y="190">The file your design system was always missing.</text>

  <!-- Sub tagline -->
  <text class="sub" x="88" y="224">A machine-readable component manifest for coding agents.</text>

  <!-- Bottom badge row -->
  <g opacity="0" style="animation: fadeUp 0.8s ease forwards; animation-delay: 3.6s;">
    <!-- Badge: Public -->
    <rect x="88" y="244" width="70" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text font-family="Inter, monospace" font-size="11" fill="#8b949e" x="123" y="259" text-anchor="middle">Public</text>

    <!-- Badge: MIT -->
    <rect x="168" y="244" width="52" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text font-family="Inter, monospace" font-size="11" fill="#8b949e" x="194" y="259" text-anchor="middle">MIT</text>

    <!-- Badge: system.md -->
    <rect x="230" y="244" width="82" height="22" rx="11" fill="#1e3a5f" stroke="#2563EB" stroke-width="1"/>
    <text font-family="Inter, monospace" font-size="11" fill="#60a5fa" x="271" y="259" text-anchor="middle">system.md</text>

    <!-- Badge: AI-ready -->
    <rect x="322" y="244" width="72" height="22" rx="11" fill="#1e3a5f" stroke="#2563EB" stroke-width="1"/>
    <text font-family="Inter, monospace" font-size="11" fill="#60a5fa" x="358" y="259" text-anchor="middle">AI-ready</text>
  </g>
</svg>
